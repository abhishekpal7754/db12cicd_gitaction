name: CI/CD Pipeline

on:
  push:
 #  workflow_dispatch:
    branches:
      - main

env:
  IMAGE_NAME: devops7754/flask-app   # change this as per your dockerhub id 

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Image Tag
      run: echo "TAG=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:$TAG .

    - name: Push Docker Image
      run: docker push $IMAGE_NAME:$TAG

    - name: Set up Kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
        kubectl set image deployment/flask-deployment \
        flask=$IMAGE_NAME:$TAG
        kubectl rollout status deployment/flask-deployment --timeout=300s
